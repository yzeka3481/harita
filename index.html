<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Şehir Haritam - Pro Gezgin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0d1b26;
      --panel: #132633;
      --panel-2: #182f3f;
      --line: rgba(255, 255, 255, .09);
      --text: #eef5fb;
      --muted: #9bb0bf;
      --accent: #ff4d4d;
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; font-family: 'Inter', sans-serif; background: #08131b; color: var(--text); overflow: hidden; }

    .app-container { max-width: 430px; margin: 0 auto; height: 100vh; position: relative; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: 120px; }
    .screen.active { display: flex; flex-direction: column; }

    /* ÜST FOTOĞRAF */
    .home-header { 
      height: 180px; width: 100%; position: relative; 
      background-size: cover; background-position: center; 
      display: flex; align-items: flex-end; padding: 20px; 
      border-bottom-left-radius: 24px; border-bottom-right-radius: 24px;
    }
    .home-header::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.7), transparent); border-radius: inherit; }
    .header-content { z-index: 2; }

    /* SON 3 ŞEHİR */
    .section-title { padding: 15px 15px 5px; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .recent-grid { padding: 0 15px; }
    .recent-item { background: var(--panel); padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
    .recent-item b { font-size: 14px; }
    .recent-item span { font-size: 12px; color: var(--muted); }

    /* BAYRAK KUTUSU VE İSTATİSTİK */
    .flag-box { background: var(--panel); margin: 15px; border-radius: 16px; padding: 15px; border: 1px solid var(--line); }
    .stats-row { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--line); }
    .stat-item { text-align: center; }
    .stat-item b { display: block; font-size: 18px; color: var(--accent); }
    .stat-item small { color: var(--muted); font-size: 10px; }

    .flag-grid { 
      display: grid; 
      grid-template-columns: repeat(20, 1fr); /* Bir satırda ~20 bayrak */
      gap: 3px; 
    }
    .f-img { 
      width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 2px;
      filter: brightness(0.2) grayscale(1); /* Gitmediğim ülkeler karanlık */
      transition: 0.3s;
    }
    .f-img.visited { filter: brightness(1) grayscale(0); transform: scale(1.2); z-index: 2; }

    /* HARİTALAR */
    #home-map { height: 160px; margin: 15px; border-radius: 15px; border: 1px solid var(--line); pointer-events: none; }
    #full-map { height: 100%; width: 100%; position: absolute; }

    /* ALT MENÜ */
    .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(19, 38, 51, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 5px calc(var(--safe-bottom) + 5px); border-top: 1px solid var(--line); z-index: 1000; }
    .nav-item { color: var(--muted); background: none; border: none; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .nav-item.active { color: var(--accent); }
    
    /* FORM */
    .screen-padd { padding: 20px; }
    input, select, textarea { width: 100%; background: var(--panel); border: 1px solid var(--line); color: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; }
    .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div id="home" class="screen active">
      <div class="home-header" id="header-bg">
        <div class="header-content"><h2 id="header-city">Yolculuk Başlasın</h2><p id="header-country" style="margin:0; opacity:0.8">Gezginin Paneli</p></div>
      </div>

      <div class="section-title">Son Keşifler</div>
      <div id="recent-list" class="recent-grid"></div>

      <div id="home-map"></div>

      <div class="flag-box">
        <div class="stats-row">
          <div class="stat-item"><b id="s-country">0</b><small>ÜLKE</small></div>
          <div class="stat-item"><b id="s-city">0</b><small>ŞEHİR</small></div>
          <div class="stat-item"><b id="s-plan">0</b><small>PLAN</small></div>
        </div>
        <div id="flag-container" class="flag-grid"></div>
      </div>
    </div>

    <div id="add" class="screen screen-padd">
      <h3>Yeni Yer Ekle</h3>
      <input type="text" id="city-in" placeholder="Şehir ara..." autocomplete="off">
      <input type="text" id="country-in" placeholder="Ülke" readonly>
      <select id="status-in">
        <option value="visited">Gittim</option>
        <option value="plan">Gideceğim</option>
      </select>
      <button class="btn-save" id="save-btn">Kaydet</button>
    </div>

    <div id="map-view" class="screen"><div id="full-map"></div></div>

    <div id="records" class="screen screen-padd">
      <h3>Liste</h3>
      <div id="records-list"></div>
    </div>

    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="home">🏠<span>Özet</span></button>
      <button class="nav-item" data-screen="add">➕<span>Ekle</span></button>
      <button class="nav-item" data-screen="map-view">🗺️<span>Harita</span></button>
      <button class="nav-item" data-screen="records">📜<span>Liste</span></button>
    </nav>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let db = JSON.parse(localStorage.getItem('my_map_data')) || [];
    let hMap, fMap;

    // TÜM ÜLKE KODLARI (Bayraklar için)
    const countryCodes = ["af","al","dz","ad","ao","ag","ar","am","au","at","az","bs","bh","bd","bb","by","be","bz","bj","bt","bo","ba","bw","br","bn","bg","bf","bi","kh","cm","ca","cv","cf","td","cl","cn","co","km","cg","cd","cr","ci","hr","cu","cy","cz","dk","dj","dm","do","ec","eg","sv","gq","er","ee","sz","et","fj","fi","fr","ga","gm","ge","de","gh","gr","gd","gt","gn","gw","gy","ht","hn","hu","is","in","id","ir","iq","ie","il","it","jm","jp","jo","kz","ke","ki","kp","kr","kw","kg","la","lv","lb","ls","lr","ly","li","lt","lu","mg","mw","my","mv","ml","mt","mh","mr","mu","mx","fm","md","mc","mn","me","ma","mz","mm","na","nr","np","nl","nz","ni","ne","ng","no","om","pk","pw","pa","pg","py","pe","ph","pl","pt","qa","ro","ru","rw","kn","lc","vc","ws","sm","st","sa","sn","rs","sc","sl","sg","sk","si","sb","so","za","ss","es","lk","sd","sr","se","ch","sy","tw","tj","tz","th","tl","tg","to","tt","tn","tr","tm","tv","ug","ua","ae","gb","us","uy","uz","vu","ve","vn","ye","zm","zw"];

    async function initMaps() {
      // Ana Sayfa Haritası (Yazısız)
      hMap = L.map('home-map', { center: [20, 0], zoom: 1, zoomControl: false, dragging: false, scrollWheelZoom: false, attributionControl: false });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { noWrap: true }).addTo(hMap);

      // Harita Menüsü (Aydınlık)
      fMap = L.map('full-map', { center: [39, 35], zoom: 3, minZoom: 2.5, worldCopyJump: true, zoomControl: false });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(fMap);

      // Ülke Boyama (Ana Sayfa)
      try {
        const geoRes = await fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json');
        const geoData = await geoRes.json();
        const visitedSet = new Set(db.filter(x => x.status === 'visited').map(x => x.country.toLowerCase()));
        L.geoJSON(geoData, {
          style: (f) => ({ fillColor: visitedSet.has(f.properties.name.toLowerCase()) ? '#ff4d4d' : '#2a4d69', fillOpacity: 0.6, weight: 1, color: '#0d1b26' })
        }).addTo(hMap);
      } catch(e) {}
    }

    function renderHome() {
      const recentList = document.getElementById('recent-list');
      const flagContainer = document.getElementById('flag-container');
      const visited = db.filter(x => x.status === 'visited');
      const visitedCountries = new Set(visited.map(x => x.country.toLowerCase()));

      // 1. Üst Fotoğraf
      if(visited.length > 0) {
        const r = visited[visited.length-1];
        document.getElementById('header-bg').style.backgroundImage = `url('https://source.unsplash.com/featured/430x180/?${r.city},cityscape')`;
        document.getElementById('header-city').innerText = r.city;
        document.getElementById('header-country').innerText = r.country;
      }

      // 2. Son 3 Şehir
      recentList.innerHTML = '';
      db.slice(-3).reverse().forEach(item => {
        recentList.innerHTML += `<div class="recent-item">📍 <div><b>${item.city}</b><br><span>${item.country}</span></div></div>`;
      });

      // 3. İstatistikler
      document.getElementById('s-country').innerText = visitedCountries.size;
      document.getElementById('s-city').innerText = visited.length;
      document.getElementById('s-plan').innerText = db.filter(x => x.status === 'plan').length;

      // 4. Bayraklar (Parlak/Karanlık)
      flagContainer.innerHTML = '';
      // Bazı yaygın ülke isimleri ile kodlarını eşleştirme (Basitleştirilmiş)
      const countryToCode = {"turkey":"tr","germany":"de","france":"fr","italy":"it","spain":"es","belgium":"be","netherlands":"nl"};
      
      countryCodes.forEach(code => {
        const isVisited = Array.from(visitedCountries).some(vc => vc.includes(code) || (countryToCode[vc] === code));
        flagContainer.innerHTML += `<img src="https://flagcdn.com/w40/${code}.png" class="f-img ${isVisited ? 'visited' : ''}">`;
      });
    }

    // Navigasyon ve Kayıt Fonksiyonları (Öncekiyle Aynı)
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.screen, .nav-item').forEach(x => x.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.screen).classList.add('active');
            if(btn.dataset.screen === 'map-view') setTimeout(() => fMap.invalidateSize(), 100);
        }
    });

    window.onload = () => { initMaps(); renderHome(); };
  </script>
</body>
</html>
